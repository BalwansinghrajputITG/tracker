services:
  # Redis only (MongoDB is Atlas cloud)
  redis:
    image: redis:7.4-alpine
    container_name: enterprise_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend — exposed on host port 8004 (for ngrok)
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: enterprise_backend
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8004:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # React Frontend — exposed on host port 3000
  # Set REACT_APP_API_URL and REACT_APP_WS_URL in a .env file next to docker-compose.yml
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-https://theoretical-extend-secrets-automatic.trycloudflare.com/api/v1}
        REACT_APP_WS_URL: ${REACT_APP_WS_URL:-ws://localhost:8004/ws}
    container_name: enterprise_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge
